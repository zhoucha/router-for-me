[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:redis]
command=redis-server
user=user
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:cli-proxy-api]
command=/app/cli-proxy-api
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# 不指定 user，默认为 root